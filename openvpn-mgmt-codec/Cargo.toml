[package]
name = "openvpn-mgmt-codec"
version = "0.1.0"
edition = "2024"
description = "OpenVPN management protocol codecs (tokio-util en/decoder implementations)."

[dependencies]
bytes = "1"
thiserror = "2"
tokio-util = { version = "0.7", features = ["codec"] }

[dev-dependencies]
futures = "0.3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
