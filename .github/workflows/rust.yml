name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false
    - name: Build
      run: cargo build
    - name: Run tests
      run: cargo test

  conformance:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false
    - name: Start OpenVPN
      run: docker compose up -d --wait
    - name: Verify containers are running
      run: docker compose ps
    - name: Run remote/proxy conformance test
      run: cargo test -p openvpn-mgmt-codec --features conformance-tests --test conformance_remote
    - name: Run server-mode conformance test
      run: cargo test -p openvpn-mgmt-codec --features conformance-tests --test conformance_server
    - name: Run password notification conformance test
      run: cargo test -p openvpn-mgmt-codec --features conformance-tests --test conformance_password
    - name: Run wire-format conformance tests
      run: cargo test -p openvpn-mgmt-codec --features conformance-tests --test conformance_wire_format -- --test-threads=1
    - name: Run basic conformance tests
      run: cargo test -p openvpn-mgmt-codec --features conformance-tests --test conformance -- --test-threads=1
    - name: Show container logs on failure
      if: failure()
      run: docker compose logs --tail=100
    - name: Stop OpenVPN
      if: always()
      run: docker compose down
